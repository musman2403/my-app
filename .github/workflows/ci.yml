name: Python CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Download your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      # Step 3 - Run your build script
      - name: Run build
        run: python build.py